<!DOCTYPE html>
<html>
<head>
    <title>Edit Expense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow-sm">
        <h3 class="mb-3">Edit Expense</h3>

        <form method="POST">
            <input type="text" name="title" class="form-control mb-3"
                   value="{{ expense[1] }}" required>

            <input type="number" name="amount" class="form-control mb-3"
                   value="{{ expense[2] }}" required>

            <input type="text" name="category" class="form-control mb-3"
                   value="{{ expense[3] }}" required>

            <input type="date" name="date" class="form-control mb-3"
                   value="{{ expense[4] }}" required>

            <button type="submit" class="btn btn-primary">Update</button>
            <a href="/" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>

</body>
</html>
